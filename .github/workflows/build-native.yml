name: Build LCA Native

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 1

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pyinstaller
        pip install PySide6==6.9.1
        pip install pyautogui opencv-python numpy pynput pywin32 pygetwindow
        pip install pillow mss pyperclip PyMsgBox PyRect PyScreeze pytweening
        pip install keyboard mouse comtypes dxcam PyDirectInput
      timeout-minutes: 20

    - name: Build with PyInstaller
      run: |
        pyinstaller --name=LCA `
          --onedir `
          --windowed `
          --hidden-import=PySide6.QtCore `
          --hidden-import=PySide6.QtGui `
          --hidden-import=PySide6.QtWidgets `
          --hidden-import=pynput.keyboard._win32 `
          --hidden-import=pynput.mouse._win32 `
          --hidden-import=PIL `
          --hidden-import=cv2 `
          --hidden-import=numpy `
          --hidden-import=pyautogui `
          --hidden-import=pygetwindow `
          --hidden-import=win32gui `
          --hidden-import=win32con `
          --hidden-import=win32api `
          --hidden-import=ctypes `
          --hidden-import=plugins.adapters.native `
          --hidden-import=plugins.adapters.native.adapter `
          --hidden-import=plugins.core.interface `
          --hidden-import=plugins.core.manager `
          --collect-all PySide6 `
          --collect-all pyautogui `
          --collect-all pynput `
          --collect-all cv2 `
          --collect-all numpy `
          --add-data "resources;resources" `
          --add-data "themes;themes" `
          --add-data "market;market" `
          --add-data "plugins/config.json;plugins" `
          main.py
      timeout-minutes: 60

    - name: Package
      run: |
        if (-not (Test-Path "dist/LCA/plugins/adapters")) {
          New-Item -ItemType Directory -Path "dist/LCA/plugins/adapters" -Force
        }
        Copy-Item -Path "plugins/adapters/native" -Destination "dist/LCA/plugins/adapters/native" -Recurse -Force
        Copy-Item -Path "plugins/config.json" -Destination "dist/LCA/plugins/config.json" -Force
        Compress-Archive -Path "dist/LCA/*" -DestinationPath "dist/LCA-Native.zip" -Force
        Write-Host "=== 构建产物 ==="
        Get-ChildItem dist/ | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,1)}} | Format-Table -AutoSize
      timeout-minutes: 10

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LCA-Native-${{ github.run_number }}
        path: dist/LCA-Native.zip
        retention-days: 7
